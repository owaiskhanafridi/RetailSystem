services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: retail-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  orderservice:
    build:
      context: .
      dockerfile: src/OrderService/Dockerfile
    ports:
      - "5101:8080"
      - "5105:8081"
    depends_on:
      inventoryservice:
        condition: service_started
      paymentservice:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  paymentservice:
    build:
      context: .
      dockerfile: src/PaymentService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5102:8080"

  inventoryservice:
    build:
      context: .
      dockerfile: src/InventoryService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5103:8080"

  shippingservice:
    build:
      context: .
      dockerfile: src/ShippingService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5104:8080"
    depends_on:
      - rabbitmq
